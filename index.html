<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Estudio Jurídico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c12;
      --bg-elevated: #14141c;
      --bg-input: #1a1a24;
      --fg: #e4e4ec;
      --fg-muted: #7c7c8c;
      --accent: #7890b8;
      --accent-dim: #5c6c88;
      --border: #2a2a38;
      --success: #58a868;
      --priority: #b89050;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    .font-serif {
      font-family: 'Crimson Pro', Georgia, serif;
    }

    /* Mobile-first container */
    .app-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      max-width: 100%;
      height: 100%;
      height: 100dvh;
    }

    @media (min-width: 500px) {
      .app-container {
        max-width: 440px;
        margin: 0 auto;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
    }

    /* Compact Header */
    .header {
      flex-shrink: 0;
      padding: 0.75rem 1rem;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-box {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent-dim), var(--accent));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-box svg {
      width: 18px;
      height: 18px;
      stroke: var(--bg);
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .header-sub {
      font-size: 0.6875rem;
      color: var(--fg-muted);
      display: flex;
      align-items: center;
      gap: 0.375rem;
      margin-top: 0.125rem;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Progress bar */
    .progress-track {
      height: 2px;
      background: var(--border);
      margin-top: 0.625rem;
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s ease;
    }

    /* Messages - flexible area */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      max-width: 92%;
      opacity: 0;
      transform: translateY(12px);
      animation: msgIn 0.35s ease forwards;
    }

    @keyframes msgIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-bot {
      align-self: flex-start;
    }

    .msg-user {
      align-self: flex-end;
    }

    .bubble-bot {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px;
      padding: 0.75rem 0.875rem;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .bubble-user {
      background: var(--accent-dim);
      border-radius: 14px 4px 14px 14px;
      padding: 0.625rem 0.875rem;
      font-size: 0.875rem;
      line-height: 1.45;
    }

    .msg-label {
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 0.375rem;
    }

    /* Typing indicator */
    .typing-indicator {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px;
      padding: 0.75rem 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .typing-dots {
      display: flex;
      gap: 3px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    .typing-text {
      font-size: 0.75rem;
      color: var(--fg-muted);
    }

    /* Options */
    .options-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .opt-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 0.625rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .opt-btn:active {
      background: var(--bg-elevated);
      border-color: var(--accent);
    }

    .opt-btn.priority {
      border-color: var(--priority);
      background: rgba(184, 144, 80, 0.08);
    }

    .opt-dot {
      width: 5px;
      height: 5px;
      background: var(--accent-dim);
      border-radius: 1px;
      flex-shrink: 0;
    }

    .opt-btn.priority .opt-dot {
      background: var(--priority);
    }

    /* Input area - fixed at bottom */
    .input-area {
      flex-shrink: 0;
      padding: 0.75rem 1rem;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
      background: var(--bg-elevated);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      position: relative;
    }

    .input-field {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      color: var(--fg);
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.4;
      resize: none;
      min-height: 40px;
      max-height: 80px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .input-field:focus {
      border-color: var(--accent);
    }

    .input-field::placeholder {
      color: var(--fg-muted);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .send-btn:active {
      opacity: 0.8;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      stroke: var(--bg);
    }

    /* Form */
    .form-card {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.875rem;
      margin-top: 0.75rem;
    }

    .form-head {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.625rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .form-field {
      margin-bottom: 0.5rem;
    }

    .form-label {
      font-size: 0.6875rem;
      color: var(--fg-muted);
      margin-bottom: 0.25rem;
      display: block;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.625rem;
      color: var(--fg);
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: var(--fg-muted);
    }

    .form-submit {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 0.625rem;
      color: var(--bg);
      font-weight: 600;
      font-size: 0.875rem;
      margin-top: 0.375rem;
      cursor: pointer;
    }

    .form-submit:active {
      opacity: 0.9;
    }

    /* Success */
    .success-wrap {
      text-align: center;
      padding: 1.25rem 1rem;
    }

    .success-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 0.75rem;
      background: rgba(88, 168, 104, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.4s ease;
    }

    @keyframes scaleIn {
      0% { transform: scale(0); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .success-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--success);
      stroke-dasharray: 24;
      stroke-dashoffset: 24;
      animation: draw 0.4s ease 0.2s forwards;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    .success-title {
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .success-desc {
      font-size: 0.8125rem;
      color: var(--fg-muted);
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="logo-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/>
          </svg>
        </div>
        <div>
          <div class="header-title font-serif">Estudio Jurídico</div>
          <div class="header-sub">
            <span class="status-dot"></span>
            <span>Abogados disponibles</span>
          </div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages-container" id="messagesContainer"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <div class="input-box">
          <textarea 
            class="input-field" 
            id="inputField" 
            placeholder="Escriba su mensaje..." 
            rows="1"
          ></textarea>
        </div>
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // State machine
    const State = {
      GREETING: 'greeting',
      AREA_SELECT: 'area',
      CASE_DESC: 'case_desc',
      RESPONSE: 'response',
      URGENCY: 'urgency',
      FORM: 'form',
      SUCCESS: 'success',
      COMPLETE: 'complete'
    };

    // Flow content
    const flow = {
      [State.GREETING]: {
        msg: `<div class="msg-label">Asesor Legal Virtual</div>Bienvenido. Ha contactado con nuestro estudio jurídico. Estoy aquí para orientarlo de manera confidencial y precisa. ¿En qué área legal requiere asistencia?`,
        opts: [
          { t: 'Derecho Laboral', v: 'laboral' },
          { t: 'Derecho de Familia', v: 'familia' },
          { t: 'Derecho Civil', v: 'civil' },
          { t: 'Derecho Penal', v: 'penal' },
          { t: 'Otra consulta', v: 'otra' }
        ]
      },
      [State.AREA_SELECT]: {
        msg: `<div class="msg-label">Registro de caso</div>Para brindarle una mejor orientación, ¿podría describirme brevemente su situación actual?`,
        placeholder: 'Describa su situación...'
      },
      [State.RESPONSE]: {
        msg: `<div class="msg-label">Evaluación preliminar</div>Comprendo la situación que describe. Este tipo de casos requiere una evaluación detallada para proteger adecuadamente sus derechos. Nuestro equipo cuenta con experiencia en procesos similares, lo que nos permite plantear estrategias efectivas desde el inicio.`
      },
      [State.URGENCY]: {
        msg: `<div class="msg-label">Consideración importante</div>En escenarios como este, el tiempo es un factor clave. Actuar con anticipación puede marcar una diferencia significativa en el resultado.`,
        opts: [
          { t: 'Deseo agendar una asesoría', v: 'agendar', priority: true },
          { t: 'Necesito más información', v: 'info' }
        ]
      },
      [State.FORM]: {
        msg: `<div class="msg-label">Registro de cita</div>Para coordinar su asesoría, necesitaré registrar los siguientes datos:`,
        showForm: true
      },
      [State.COMPLETE]: {
        msg: `<div class="msg-label">Confirmación</div>Gracias por la información. En breve, uno de nuestros abogados se pondrá en contacto para confirmar su cita. Quedamos a su disposición.`
      }
    };

    const objections = {
      info: `Lo entiendo. Para poder brindarle una orientación precisa y responsable, es necesario evaluar su caso en detalle. La asesoría le permitirá tener claridad antes de tomar cualquier decisión.`,
      despues: `Comprendido. Cuando considere oportuno, puede contactarnos nuevamente. Tenga en cuenta que en asuntos legales, la oportunidad de actuación puede ser determinante.`
    };

    // State
    let state = State.GREETING;
    let progress = 0;
    let data = { area: '', desc: '', name: '', phone: '', avail: '' };

    // DOM
    let container = null;
    let inputField = null;
    let sendBtn = null;
    let progressBar = null;

    // Init
    function init() {
      container = document.getElementById('messagesContainer');
      inputField = document.getElementById('inputField');
      sendBtn = document.getElementById('sendBtn');
      progressBar = document.getElementById('progressBar');

      if (!container || !inputField || !sendBtn) return;

      sendBtn.addEventListener('click', handleSend);
      
      inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });

      inputField.addEventListener('input', () => {
        inputField.style.height = 'auto';
        inputField.style.height = Math.min(inputField.scrollHeight, 80) + 'px';
      });

      // Start
      setTimeout(() => showBotMsg(flow[State.GREETING]), 400);
    }

    // Update progress
    function setProgress(val) {
      progress = Math.min(val, 6);
      progressBar.style.width = (progress / 6 * 100) + '%';
    }

    // Scroll
    function scrollDown() {
      container.scrollTop = container.scrollHeight;
    }

    // Create elements
    function createTyping() {
      const el = document.createElement('div');
      el.className = 'message msg-bot';
      el.id = 'typing';
      el.innerHTML = `
        <div class="typing-indicator">
          <div class="typing-dots">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
          </div>
          <span class="typing-text">Redactando</span>
        </div>
      `;
      return el;
    }

    function createMsg(text, isBot = true) {
      const el = document.createElement('div');
      el.className = `message ${isBot ? 'msg-bot' : 'msg-user'}`;
      el.innerHTML = `<div class="${isBot ? 'bubble-bot' : 'bubble-user'}">${text}</div>`;
      return el;
    }

    function createOpts(opts) {
      const el = document.createElement('div');
      el.className = 'options-wrap';
      el.id = 'opts';
      opts.forEach(o => {
        const btn = document.createElement('button');
        btn.className = `opt-btn ${o.priority ? 'priority' : ''}`;
        btn.innerHTML = `<span class="opt-dot"></span>${o.t}`;
        btn.onclick = () => selectOpt(o);
        el.appendChild(btn);
      });
      return el;
    }

    function createForm() {
      const el = document.createElement('div');
      el.className = 'form-card';
      el.id = 'formCard';
      el.innerHTML = `
        <div class="form-head">Datos de contacto</div>
        <div class="form-field">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-input" id="fName" placeholder="Su nombre">
        </div>
        <div class="form-field">
          <label class="form-label">WhatsApp</label>
          <input type="tel" class="form-input" id="fPhone" placeholder="Número de contacto">
        </div>
        <div class="form-field">
          <label class="form-label">Disponibilidad</label>
          <input type="text" class="form-input" id="fAvail" placeholder="Día y hora">
        </div>
        <button class="form-submit" id="fSubmit">Confirmar cita</button>
      `;
      return el;
    }

    function createSuccess() {
      const el = document.createElement('div');
      el.className = 'success-wrap';
      el.innerHTML = `
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="success-title">Registro completado</div>
        <div class="success-desc">Su solicitud ha sido procesada</div>
      `;
      return el;
    }

    // Show bot message
    function showBotMsg(content, isFinal = false) {
      // Remove old opts
      const oldOpts = document.getElementById('opts');
      if (oldOpts) oldOpts.remove();

      // Typing
      const typing = createTyping();
      container.appendChild(typing);
      scrollDown();

      setTimeout(() => {
        typing.remove();

        if (content.showSuccess) {
          container.appendChild(createSuccess());
          scrollDown();
          setTimeout(() => showBotMsg(flow[State.COMPLETE]), 1200);
          return;
        }

        const msg = createMsg(content.msg);
        container.appendChild(msg);

        if (content.opts) {
          msg.querySelector('.bubble-bot').appendChild(createOpts(content.opts));
        }

        if (content.showForm) {
          msg.querySelector('.bubble-bot').appendChild(createForm());
          document.getElementById('fSubmit').onclick = submitForm;
        }

        scrollDown();
        setProgress(progress + 1);
      }, 800);
    }

    // Show user message
    function showUserMsg(text) {
      const msg = createMsg(text, false);
      container.appendChild(msg);
      scrollDown();
    }

    // Select option
    function selectOpt(opt) {
      showUserMsg(opt.t);
      const oldOpts = document.getElementById('opts');
      if (oldOpts) oldOpts.remove();

      // Handle objections
      if (objections[opt.v]) {
        showBotMsg({
          msg: objections[opt.v],
          opts: [
            { t: 'De acuerdo, procedamos', v: 'agendar', priority: true },
            { t: 'Lo pensaré', v: 'despues' }
          ]
        });
        return;
      }

      transition(opt.v);
    }

    // State transitions
    function transition(input) {
      switch (state) {
        case State.GREETING:
          data.area = input;
          state = State.AREA_SELECT;
          inputField.placeholder = flow[State.AREA_SELECT].placeholder || 'Escriba su mensaje...';
          showBotMsg(flow[State.AREA_SELECT]);
          break;

        case State.AREA_SELECT:
          data.desc = input;
          state = State.RESPONSE;
          showBotMsg(flow[State.RESPONSE]);
          setTimeout(() => {
            state = State.URGENCY;
            showBotMsg(flow[State.URGENCY]);
          }, 1600);
          break;

        case State.URGENCY:
          if (input === 'agendar') {
            state = State.FORM;
            showBotMsg(flow[State.FORM]);
          }
          break;

        default:
          break;
      }
    }

    // Submit form
    function submitForm() {
      const name = document.getElementById('fName').value.trim();
      const phone = document.getElementById('fPhone').value.trim();
      const avail = document.getElementById('fAvail').value.trim();

      if (!name || !phone || !avail) return;

      data.name = name;
      data.phone = phone;
      data.avail = avail;

      const formCard = document.getElementById('formCard');
      if (formCard) formCard.remove();

      showUserMsg(`${name}<br>${phone}<br>${avail}`);
      setProgress(6);

      state = State.SUCCESS;
      showBotMsg({ showSuccess: true });
    }

    // Handle send
    function handleSend() {
      const text = inputField.value.trim();
      if (!text) return;

      showUserMsg(text);
      inputField.value = '';
      inputField.style.height = 'auto';

      transition(text);
    }

    // Start
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
